version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: resume-api
    ports:
      - "8000:8000"
    environment:
      - NODE_ENV=development
      - PORT=8000
      - MONGO_URL=${MONGO_URL:-mongodb://mongo:27017/resume-api}
      - FIREBASE_PROJECT_ID=${FIREBASE_PROJECT_ID}
      - FIREBASE_PRIVATE_KEY=${FIREBASE_PRIVATE_KEY}
      - FIREBASE_CLIENT_EMAIL=${FIREBASE_CLIENT_EMAIL}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
    depends_on:
      - mongo
    volumes:
      - ./uploads:/app/uploads
    networks:
      - resume-network
    restart: unless-stopped

  mongo:
    image: mongo:8.0-alpine
    container_name: resume-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    environment:
      - MONGO_INITDB_DATABASE=resume-api
    networks:
      - resume-network
    restart: unless-stopped

volumes:
  mongo-data:

networks:
  resume-network:
    driver: bridge
