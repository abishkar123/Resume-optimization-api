trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - main

variables:
  nodeVersion: '22.x'
  azureServiceConnection: 'Azure subscription 1(156c186b-44ba-4fb4-98c1-4ff26e131d41)'
  webAppName: 'resume-op-app'

stages:
  - stage: BuildAndTest
    displayName: Build and test
    jobs:
      - job: Build
        displayName: Install, test, and build
        pool:
          vmImage: 'ubuntu-latest'

        steps:
          - task: NodeTool@0
            displayName: Use Node.js $(nodeVersion)
            inputs:
              versionSpec: $(nodeVersion)

          - task: Cache@2
            displayName: Cache npm
            inputs:
              key: 'npm | "$(Agent.OS)" | package-lock.json'
              restoreKeys: |
                npm | "$(Agent.OS)"
              path: $(Pipeline.Workspace)/.npm

          - script: npm ci
            displayName: Install dependencies
            env:
              npm_config_cache: $(Pipeline.Workspace)/.npm

          - script: npm test -- --runInBand
            displayName: Run tests

          - script: npm run build
            displayName: Build application

          - script: |
              mkdir -p $(Build.ArtifactStagingDirectory)/app
              cp package.json $(Build.ArtifactStagingDirectory)/app/
              cp package-lock.json $(Build.ArtifactStagingDirectory)/app/
              cp -R dist $(Build.ArtifactStagingDirectory)/app/
              npm ci --omit=dev --prefix $(Build.ArtifactStagingDirectory)/app
            displayName: Prepare deployment package
            env:
              npm_config_cache: $(Pipeline.Workspace)/.npm

          - task: ArchiveFiles@2
            displayName: Archive deployment package
            inputs:
              rootFolderOrFile: $(Build.ArtifactStagingDirectory)/app
              includeRootFolder: false
              archiveType: zip
              archiveFile: $(Build.ArtifactStagingDirectory)/app.zip
              replaceExistingArchive: true

          - task: PublishBuildArtifacts@1
            displayName: Publish artifact
            inputs:
              PathtoPublish: $(Build.ArtifactStagingDirectory)/app.zip
              ArtifactName: drop
              publishLocation: Container

  - stage: Deploy
    displayName: Deploy to Azure App Service
    dependsOn: BuildAndTest
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - deployment: DeployWebApp
        displayName: Deploy web app
        environment: production
        pool:
          vmImage: 'ubuntu-latest'
        strategy:
          runOnce:
            deploy:
              steps:
                - download: current
                  artifact: drop

                - task: AzureWebApp@1
                  displayName: Deploy to Azure App Service
                  inputs:
                    azureSubscription: $(azureServiceConnection)
                    appType: webAppLinux
                    appName: $(webAppName)
                    package: $(Pipeline.Workspace)/drop/app.zip
                    runtimeStack: 'NODE|22-lts'
                    startUpCommand: 'npm start'